name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Triggers on push to main branch
  pull_request:
    branches: [ "main" ] # Runs tests on PRs targeting main

jobs:
  build-test-publish:
    runs-on: ubuntu-latest # Official free GitHub Actions runner
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # SDK 10.0.x compiles recent projects and has backward compatibility (including .NET Standard 2.1)
          dotnet-version: '10.0.x' 

      - name: Run Tests (xUnit)
        # The test command implicitly restores and builds.
        # If tests fail, the pipeline stops here.
        run: dotnet test src/TinyValidation.Tests/TinyValidation.Tests.csproj --configuration Release

      - name: Pack library and Increment Version
        # Runs only on main branch (ignoring PRs)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # We use github.run_number to ensure the patch version is always incremented (e.g., 1.0.1, 1.0.2...)
        run: dotnet pack src/TinyValidation/TinyValidation.csproj --configuration Release --output ./nupkg /p:PackageVersion=1.0.${{ github.run_number }}

      - name: Publish to NuGet.org
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # Uses the NUGET_API_KEY secret to authenticate the publication of the generated .nupkg
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
