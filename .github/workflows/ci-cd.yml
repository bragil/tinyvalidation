name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Triggers on push to main branch
  pull_request:
    branches: [ "main" ] # Runs tests on PRs targeting main

jobs:
  build-test-publish:
    runs-on: ubuntu-latest # Official free GitHub Actions runner
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # SDK 10.0.x compiles recent projects and has backward compatibility (including .NET Standard 2.1)
          dotnet-version: '10.0.x' 

      - name: Restore dependencies
        run: |
          dotnet restore src/TinyValidation/TinyValidation/TinyValidation.csproj
          dotnet restore src/TinyValidation.Tests/TinyValidation.Tests.csproj

      - name: Build project
        run: |
          dotnet build src/TinyValidation/TinyValidation/TinyValidation.csproj --configuration Release --no-restore
          dotnet build src/TinyValidation/TinyValidation.Tests/TinyValidation.Tests.csproj --configuration Release --no-restore

      - name: Run Tests (xUnit)
        # We use --no-build to test the exact binaries we just explicitly built
        # If tests fail, the pipeline stops here.
        run: dotnet test src/TinyValidation/TinyValidation.Tests/TinyValidation.Tests.csproj --configuration Release --no-build

      - name: Pack library and Increment Version
        # Runs only on main branch (ignoring PRs)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # Added --no-build to avoid partial recompilations and updated path to match your error log
        run: dotnet pack src/TinyValidation/TinyValidation/TinyValidation.csproj --configuration Release --no-build --output ./nupkg /p:PackageVersion=1.0.${{ github.run_number }}

      - name: Publish to NuGet.org
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # Uses the NUGET_API_KEY secret to authenticate the publication of the generated .nupkg
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
